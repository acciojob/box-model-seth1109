<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Colored Blocks</title>

  <style>
    /* Container */
    .container {
      width: 300px;
      margin: 50px auto;           /* center horizontally */
      padding: 20px;
      border: 2px solid black;
      border-radius: 10px;
      text-align: center;          /* align blocks inline center */
    }

    /* Common block styles */
    .red, .green, .yellow {
      width: 60px;
      height: 60px;
      border-radius: 50%;          /* makes circle */
      display: inline-block;       /* inline layout */
      margin: 10px;
    }

    /* Individual colors */
    .red {
      background-color: red;
    }

    .green {
      background-color: green;
    }

    .yellow {
      background-color: yellow;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="red"></div>
    <div class="green"></div>
    <div class="yellow"></div>
  </div>

</body>
</html>
